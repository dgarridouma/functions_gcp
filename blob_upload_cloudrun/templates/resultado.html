<h2>Resultado del análisis</h2>

{% if listo %}
  <p>Tu archivo ya está procesado. <a href="/descargar/{{ filename }}" target="_blank">Descargar resultado</a></p>
{% else %}
  <p>Aún se está procesando el archivo. Vuelve a intentar en unos segundos.</p>
  <form method="GET">
    <button type="submit">Volver a comprobar</button>
  </form>
{% endif %}
